version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ledger_postgres
    restart: always
    environment:
      POSTGRES_USER: ledger_admin
      POSTGRES_PASSWORD: secure_password_here
      POSTGRES_DB: fintech_ledger
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data